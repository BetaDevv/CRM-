server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    location /api/ {
        proxy_pass http://backend:3001;    # Redirige al container backend
    }

    location /uploads/ {
        proxy_pass http://backend:3001;    # Para fotos y documentos
    }
}